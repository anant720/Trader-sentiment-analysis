<svg width="100%" viewBox="0 0 690 390" role="img" xmlns="http://www.w3.org/2000/svg" style="">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Arcus logo</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Premium wordmark logo for Arcus college app — geometric arc mark with clean sans-serif type</desc>

  <defs>
    
  </defs>

  <!-- Background -->
  <rect width="680" height="380" fill="#F2F2F7" rx="20" style="fill:rgb(242, 242, 247);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- === ICON MARK === -->
  <!-- Outer arc (thick, accent blue) -->
  <path d="M 262 196 A 78 78 0 0 1 418 196" fill="none" stroke="#0A84FF" stroke-width="11" stroke-linecap="round" style="fill:none;stroke:rgb(10, 132, 255);color:rgb(255, 255, 255);stroke-width:11px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- Inner arc (thin, lighter) -->
  <path d="M 279 196 A 61 61 0 0 1 401 196" fill="none" stroke="#0A84FF" stroke-width="4" stroke-linecap="round" opacity="0.28" style="fill:none;stroke:rgb(10, 132, 255);color:rgb(255, 255, 255);stroke-width:4px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.28;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- Third arc (minimal, innermost) -->
  <path d="M 298 196 A 42 42 0 0 1 382 196" fill="none" stroke="#0A84FF" stroke-width="2" stroke-linecap="round" opacity="0.13" style="fill:none;stroke:rgb(10, 132, 255);color:rgb(255, 255, 255);stroke-width:2px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.13;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Dot / node at top of arc -->
  <circle cx="340" cy="118" r="7" fill="#0A84FF" style="fill:rgb(10, 132, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- Connector from dot down to arc apex -->
  <line x1="340" y1="125" x2="340" y2="177" stroke="#0A84FF" stroke-width="2" stroke-linecap="round" opacity="0.35" style="fill:rgb(0, 0, 0);stroke:rgb(10, 132, 255);color:rgb(255, 255, 255);stroke-width:2px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.35;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Baseline dots at arc ends -->
  <circle cx="262" cy="196" r="3.5" fill="#0A84FF" opacity="0.5" style="fill:rgb(10, 132, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="418" cy="196" r="3.5" fill="#0A84FF" opacity="0.5" style="fill:rgb(10, 132, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Horizontal baseline -->
  <line x1="230" y1="196" x2="450" y2="196" stroke="#1C1C1E" stroke-width="1" opacity="0.12" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(28, 28, 30);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.12;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- === WORDMARK === -->
  <text x="340" y="248" font-family="'DM Sans', -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="42" font-weight="500" fill="#1C1C1E" text-anchor="middle" letter-spacing="-1" style="fill:rgb(28, 28, 30);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;DM Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;SF Pro Display&quot;, sans-serif;font-size:42px;font-weight:500;text-anchor:middle;dominant-baseline:auto">arcus</text>

  <!-- Tagline -->
  <text x="340" y="278" font-family="'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif" font-size="13" font-weight="400" fill="#6C6C70" text-anchor="middle" letter-spacing="2.5" style="fill:rgb(108, 108, 112);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;DM Sans&quot;, -apple-system, BlinkMacSystemFont, sans-serif;font-size:13px;font-weight:400;text-anchor:middle;dominant-baseline:auto">CAMPUS COMPANION</text>

  <!-- === VARIANTS LABEL === -->
  <text x="50" y="330" font-family="-apple-system, sans-serif" font-size="11" fill="#AEAEB2" letter-spacing="1" style="fill:rgb(174, 174, 178);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:-apple-system, sans-serif;font-size:11px;font-weight:400;text-anchor:start;dominant-baseline:auto">FULL MARK</text>

  <!-- Divider -->
  <line x1="50" y1="340" x2="630" y2="340" stroke="#1C1C1E" stroke-width="0.5" opacity="0.1" style="fill:rgb(0, 0, 0);stroke:rgb(28, 28, 30);color:rgb(255, 255, 255);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Compact icon-only variant (small, bottom left) -->
  <path d="M 86 360 A 22 22 0 0 1 134 360" fill="none" stroke="#0A84FF" stroke-width="4" stroke-linecap="round" style="fill:none;stroke:rgb(10, 132, 255);color:rgb(255, 255, 255);stroke-width:4px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <path d="M 93 360 A 15 15 0 0 1 127 360" fill="none" stroke="#0A84FF" stroke-width="1.5" stroke-linecap="round" opacity="0.28" style="fill:none;stroke:rgb(10, 132, 255);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.28;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="110" cy="338" r="3" fill="#0A84FF" style="fill:rgb(10, 132, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="110" y1="341" x2="110" y2="355" stroke="#0A84FF" stroke-width="1.2" stroke-linecap="round" opacity="0.35" style="fill:rgb(0, 0, 0);stroke:rgb(10, 132, 255);color:rgb(255, 255, 255);stroke-width:1.2px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.35;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="86" cy="360" r="1.8" fill="#0A84FF" opacity="0.5" style="fill:rgb(10, 132, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="134" cy="360" r="1.8" fill="#0A84FF" opacity="0.5" style="fill:rgb(10, 132, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Wordmark only variant -->
  <text x="340" y="365" font-family="'DM Sans', -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="22" font-weight="500" fill="#1C1C1E" text-anchor="middle" letter-spacing="-0.5" style="fill:rgb(28, 28, 30);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;DM Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;SF Pro Display&quot;, sans-serif;font-size:22px;font-weight:500;text-anchor:middle;dominant-baseline:auto">arcus</text>

  <!-- Dot accent on wordmark -->
  <circle cx="419" cy="358" r="3.5" fill="#0A84FF" style="fill:rgb(10, 132, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
</svg>